<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Policy — ZeptoShield</title>
  <link rel="stylesheet" href="../css/theme.css" />
  <style>
    @keyframes fadein { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
    .step { display:none; }
    .step.active { display:block; animation: fadein 0.35s ease; }

    .otp-hint { font-size:0.82rem; color:var(--ink-faint); margin-bottom:18px; line-height:1.6; }
    .otp-hint strong { color:var(--ink-soft); }
    .otp-row { display:flex; gap:10px; justify-content:center; margin-bottom:20px; }
    .otp-digit {
      width:52px; height:58px; text-align:center; font-size:1.6rem; font-weight:700;
      font-family:var(--serif); color:var(--ink);
      border:2px solid var(--border); border-radius:var(--radius-sm);
      background:var(--surface); outline:none; transition:border-color 0.15s, background 0.15s;
    }
    .otp-digit:focus { border-color:var(--p500); background:#fff; box-shadow:0 0 0 3px rgba(139,92,246,0.12); }
    .otp-digit.filled { border-color:var(--p400); background:var(--p50); }
    .otp-resend { font-size:0.8rem; color:var(--ink-faint); text-align:center; margin-bottom:16px; }
    .otp-resend a { color:var(--p600); cursor:pointer; font-weight:600; }
    .otp-timer { font-variant-numeric:tabular-nums; font-weight:600; }
    .otp-err-box { background:#fef2f2; border:1px solid #fecaca; border-radius:var(--radius-sm); padding:10px 14px; font-size:0.82rem; color:var(--error); margin-bottom:14px; display:none; }
    .otp-err-box.on { display:block; }

    .demo-box { background:var(--p50); border:1px solid var(--p200); border-radius:var(--radius-sm); padding:14px 16px; margin-bottom:18px; }
    .demo-box__title { font-size:0.67rem; font-weight:700; text-transform:uppercase; letter-spacing:0.08em; color:var(--p600); margin-bottom:10px; }
    .demo-row { display:flex; justify-content:space-between; align-items:center; padding:5px 0; border-bottom:1px solid var(--p100); font-size:0.82rem; }
    .demo-row:last-of-type { border-bottom:none; }
    .demo-num { font-family:var(--serif); font-weight:600; color:var(--ink); }
    .demo-otp-val { font-family:var(--serif); font-weight:700; color:var(--p700); letter-spacing:0.12em; }
    .demo-hint { font-size:0.7rem; color:var(--ink-faint); margin-top:8px; }
    .back-link { display:inline-flex; align-items:center; gap:6px; font-size:0.82rem; color:var(--p600); cursor:pointer; margin-bottom:22px; background:none; border:none; font-family:var(--sans); padding:0; font-weight:500; }
    .back-link:hover { text-decoration:underline; }

    .field-error-box { color:var(--error); font-size:0.82rem; margin-bottom:12px; padding:8px 12px; background:#fef2f2; border:1px solid #fecaca; border-radius:var(--radius-sm); display:none; }
    .field-error-box.on { display:block; }
  </style>
</head>
<body>

<nav class="nav">
  <div class="nav__inner">
    <a class="nav__logo" href="../index.html">Zepto<span>Shield</span></a>
    <div class="nav__links">
      <button class="nav__link" onclick="location.href='how.html'">How it works</button>
      <button class="nav__link nav__link--active">My policy</button>
      <button class="nav__cta" onclick="location.href='register.html'">Get protected</button>
    </div>
  </div>
</nav>

<main class="page fade-in">
  <div class="form-wrap">

    <!-- STEP 1: Phone -->
    <div class="step active" id="step-phone">
      <div class="eyebrow-pill">My account</div>
      <h1 class="form-page__title">Find your policy.</h1>
      <p class="form-page__sub">New here? <a onclick="location.href='register.html'">Register first →</a></p>

      <div class="form-card">
        <div class="form-group">
          <label class="form-label" for="phone">Mobile number</label>
          <div style="position:relative;">
            <span style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--ink-soft);font-size:0.9rem;font-weight:500;pointer-events:none;z-index:2;">+91</span>
            <div style="position:absolute;left:44px;top:50%;transform:translateY(-50%);height:18px;width:1px;background:var(--border);z-index:2;"></div>
            <input class="form-input" id="phone" type="tel" placeholder="9876543210" maxlength="10" inputmode="numeric" style="padding-left:58px;" />
          </div>
        </div>
        <div class="field-error-box" id="phone-err"></div>

        <button class="btn btn--primary btn--full" id="lookup-btn" style="margin-top:18px;">Find my account →</button>
      </div>
    </div>

    <!-- STEP 2: OTP -->
    <div class="step" id="step-otp">
      <button class="back-link" onclick="goStep('step-phone')">← Back</button>
      <div class="eyebrow-pill">Verify identity</div>
      <h1 class="form-page__title">Enter OTP.</h1>

      <div class="form-card">
        <p class="otp-hint">A 6-digit code was sent to <strong id="otp-phone-display">+91 XXXXXXXXXX</strong>. Enter it below to view your policy.</p>

        <div class="otp-row" id="otp-row">
          <input class="otp-digit" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="one-time-code" />
          <input class="otp-digit" maxlength="1" inputmode="numeric" pattern="[0-9]" />
          <input class="otp-digit" maxlength="1" inputmode="numeric" pattern="[0-9]" />
          <input class="otp-digit" maxlength="1" inputmode="numeric" pattern="[0-9]" />
          <input class="otp-digit" maxlength="1" inputmode="numeric" pattern="[0-9]" />
          <input class="otp-digit" maxlength="1" inputmode="numeric" pattern="[0-9]" />
        </div>

        <div class="otp-err-box" id="otp-err"></div>

        <div class="otp-resend">
          Didn't receive it?
          <span id="timer-wrap"> Resend in <span class="otp-timer" id="otp-timer">30</span>s</span>
          <span id="resend-wrap" style="display:none;"><a onclick="resendOTP()">Resend OTP</a></span>
        </div>

        <button class="btn btn--primary btn--full" id="verify-btn">Verify &amp; View Policy →</button>
      </div>
    </div>

  </div>

  <footer class="footer">
    <div class="footer__inner">
      <div class="footer__logo">Zepto<span>Shield</span></div>
      <div class="footer__copy">© 2026 ZeptoShield</div>
    </div>
  </footer>
</main>

<script>
/* ═══════════════════════════════════════════════════
   DEMO DATA — fully offline, no backend required
   ═══════════════════════════════════════════════════ */

const TEST_OTPS = {
  "9692966390": "748392",
  "6294778192": "627291",
  "8117847759": "320814",
};

const DEMO_WORKERS = {
  "9692966390": { name:"Ravi Kumar",   city:"Bhubaneswar", weeklyEarnings:7500, joinDate:"2025-11-14" },
  "6294778192": { name:"Priya Sharma", city:"Mumbai",      weeklyEarnings:9200, joinDate:"2026-01-03" },
  "8117847759": { name:"Amit Patel",   city:"Delhi",       weeklyEarnings:6000, joinDate:"2025-12-20" },
};

const GENERATED_CITIES  = ["Bhubaneswar","Mumbai","Delhi","Bengaluru","Hyderabad","Chennai","Kolkata","Pune","Surat","Jaipur"];
const GENERATED_NAMES   = ["Ravi Kumar","Arjun Singh","Meena Das","Sunil Rao","Pooja Nair","Rohit Verma","Kavya Pillai","Dinesh Babu","Sunita Devi","Manoj Gupta"];

function workerForPhone(phone) {
  if (DEMO_WORKERS[phone]) return DEMO_WORKERS[phone];
  const idx = parseInt(phone.slice(-2)) % GENERATED_CITIES.length;
  return {
    name: GENERATED_NAMES[idx],
    city: GENERATED_CITIES[idx],
    weeklyEarnings: 5000 + (parseInt(phone.slice(-3)) % 8) * 500,
    joinDate: "2026-01-15",
  };
}

/* ── Shared ── */
const CITY_RISK = {
  Mumbai:{rain:2400,temp:38,aqi:145,flood:3.2}, Chennai:{rain:1400,temp:42,aqi:120,flood:2.1},
  Kolkata:{rain:1800,temp:40,aqi:180,flood:2.8}, Hyderabad:{rain:900,temp:42,aqi:130,flood:1.5},
  Bengaluru:{rain:970,temp:35,aqi:95,flood:0.8}, Delhi:{rain:750,temp:45,aqi:280,flood:0.5},
  Pune:{rain:720,temp:38,aqi:85,flood:0.6}, Ahmedabad:{rain:800,temp:46,aqi:150,flood:0.4},
  Jaipur:{rain:550,temp:46,aqi:170,flood:0.2}, Surat:{rain:1200,temp:38,aqi:130,flood:1.0},
  Lucknow:{rain:900,temp:44,aqi:200,flood:0.6}, Bhubaneswar:{rain:1500,temp:40,aqi:100,flood:1.8},
  Nagpur:{rain:1100,temp:47,aqi:110,flood:0.7}, Indore:{rain:950,temp:43,aqi:120,flood:0.5},
  Visakhapatnam:{rain:1100,temp:40,aqi:90,flood:1.2}, Coimbatore:{rain:700,temp:36,aqi:80,flood:0.4},
};

function calcPremium(city, weeklyEarnings) {
  const cf = CITY_RISK[city] || {rain:900,temp:40,aqi:120,flood:0.8};
  const rainS  = Math.min(cf.rain/2400, 1);
  const tempS  = Math.max((cf.temp-30)/20, 0);
  const aqiS   = Math.min(cf.aqi/350, 1);
  const floodS = Math.min(cf.flood/4, 1);
  const overall = rainS*0.30 + tempS*0.20 + aqiS*0.15 + floodS*0.35;
  const cityLoad = Math.round(overall*30);
  const earnAdj  = Math.round((weeklyEarnings/12000)*10);
  const total    = 20 + cityLoad + earnAdj;
  const tier     = overall>=0.6 ? "High" : overall>=0.35 ? "Medium" : "Low";
  const tierEmoji= overall>=0.6 ? "🔴" : overall>=0.35 ? "🟡" : "🟢";
  return { base:20, cityLoad, earnAdj, total, tier, tierEmoji,
    rainPct:Math.round(rainS*100), tempPct:Math.round(tempS*100),
    aqiPct:Math.round(aqiS*100), floodPct:Math.round(floodS*100) };
}

function genPolicyId(phone) {
  const seed = parseInt(phone.slice(-6));
  return "ZS-2026-" + ((seed*31337)%0xFFFFFF).toString(16).toUpperCase().padStart(6,"0");
}

/* ── Navigation ── */
let currentPhone = "";
let generatedOTP = "";
let timerInterval = null;

function goStep(id) {
  document.querySelectorAll(".step").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  window.scrollTo({top:0,behavior:"smooth"});
}

/* ── Step 1 ── */
document.getElementById("lookup-btn").addEventListener("click", () => {
  const phone = document.getElementById("phone").value.trim();
  const errEl = document.getElementById("phone-err");
  errEl.classList.remove("on");

  if (!/^\d{10}$/.test(phone)) {
    errEl.textContent = "Enter a valid 10-digit mobile number.";
    errEl.classList.add("on");
    return;
  }

  currentPhone = phone;
  generatedOTP = TEST_OTPS[phone] || String(Math.floor(100000 + Math.random()*900000));

  document.getElementById("otp-phone-display").textContent = "+91 " + phone.replace(/(\d{5})(\d{5})/,"$1 $2");
  clearDigits();
  startTimer();
  goStep("step-otp");
  document.querySelectorAll(".otp-digit")[0].focus();
});

/* ── Step 2 OTP ── */
const allDigits = () => Array.from(document.querySelectorAll(".otp-digit"));

function clearDigits() {
  allDigits().forEach(d => { d.value=""; d.classList.remove("filled"); });
  const e = document.getElementById("otp-err");
  e.textContent=""; e.classList.remove("on");
}

document.getElementById("otp-row").addEventListener("input", e => {
  if (!e.target.classList.contains("otp-digit")) return;
  const v = e.target.value.replace(/\D/g,"").slice(-1);
  e.target.value = v;
  e.target.classList.toggle("filled", !!v);
  if (v) {
    const nx = e.target.nextElementSibling;
    if (nx?.classList.contains("otp-digit")) nx.focus();
    else setTimeout(autoVerify, 120);
  }
});

document.getElementById("otp-row").addEventListener("keydown", e => {
  if (e.key==="Backspace" && !e.target.value) {
    const pv = e.target.previousElementSibling;
    if (pv?.classList.contains("otp-digit")) { pv.value=""; pv.classList.remove("filled"); pv.focus(); }
  }
});

function autoVerify() { if (allDigits().every(d => d.value)) verifyOTP(); }
document.getElementById("verify-btn").addEventListener("click", verifyOTP);

function verifyOTP() {
  const code  = allDigits().map(d => d.value).join("");
  const errEl = document.getElementById("otp-err");
  errEl.classList.remove("on");

  if (code.length < 6) {
    errEl.textContent="Please enter all 6 digits.";
    errEl.classList.add("on"); return;
  }
  if (code !== generatedOTP) {
    errEl.textContent="Incorrect OTP. Please check and try again.";
    errEl.classList.add("on");
    allDigits().forEach(d=>{d.value="";d.classList.remove("filled");}); allDigits()[0].focus(); return;
  }

  /* ✅ OTP verified — pack data and go to policy.html */
  clearInterval(timerInterval);
  const worker  = workerForPhone(currentPhone);
  const premium = calcPremium(worker.city, worker.weeklyEarnings);

  sessionStorage.setItem("zs_policy", JSON.stringify({
    phone    : currentPhone,
    policyId : genPolicyId(currentPhone),
    name     : worker.name,
    city     : worker.city,
    joinDate : worker.joinDate,
    weeklyEarnings: worker.weeklyEarnings,
    premium,
    isActive : true,
    claims   : 0,
  }));

  location.href = "policy.html";
}

function startTimer() {
  let secs=30;
  document.getElementById("otp-timer").textContent=secs;
  document.getElementById("timer-wrap").style.display="inline";
  document.getElementById("resend-wrap").style.display="none";
  clearInterval(timerInterval);
  timerInterval = setInterval(()=>{
    secs--;
    document.getElementById("otp-timer").textContent=secs;
    if(secs<=0){
      clearInterval(timerInterval);
      document.getElementById("timer-wrap").style.display="none";
      document.getElementById("resend-wrap").style.display="inline";
    }
  },1000);
}

function resendOTP() {
  generatedOTP = TEST_OTPS[currentPhone] || String(Math.floor(100000+Math.random()*900000));
  clearDigits(); startTimer(); allDigits()[0].focus();
}
</script>
</body>
</html>
