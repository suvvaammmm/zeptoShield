<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — ZeptoShield</title>
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 80px 16px 40px;
      background: var(--surface);
    }

    .login-box {
      width: 100%;
      max-width: 420px;
    }

    .login-brand {
      text-align: center;
      margin-bottom: 32px;
    }
    .login-brand__logo {
      font-family: var(--serif);
      font-size: 1.75rem;
      color: var(--ink);
      text-decoration: none;
      letter-spacing: -0.01em;
    }
    .login-brand__logo span { color: var(--accent); }
    .login-brand__sub {
      font-size: 0.8rem;
      color: var(--ink-faint);
      margin-top: 4px;
    }

    /* ── Mode toggle ── */
    .mode-toggle {
      display: flex;
      background: var(--border);
      border-radius: 10px;
      padding: 3px;
      margin-bottom: 20px;
    }
    .mode-btn {
      flex: 1; background: none; border: none;
      font-family: var(--sans); font-size: 0.835rem; font-weight: 500;
      color: var(--ink-soft); padding: 9px 0;
      border-radius: 8px; cursor: pointer;
      transition: all 0.18s;
    }
    .mode-btn--active {
      background: var(--white);
      color: var(--ink);
      box-shadow: 0 1px 6px rgba(0,0,0,0.1);
    }

    /* ── Card ── */
    .login-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px 28px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.04);
    }

    /* ── Steps ── */
    .steps {
      display: flex; align-items: center;
      margin-bottom: 28px;
    }
    .step { display: flex; align-items: center; gap: 8px; flex: 1; }
    .step__dot {
      width: 30px; height: 30px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem; font-weight: 700; flex-shrink: 0;
      transition: all 0.25s ease;
    }
    .step__dot--active  { background: var(--ink); color: var(--white); }
    .step__dot--done    { background: var(--success); color: var(--white); }
    .step__dot--pending { background: var(--border); color: var(--ink-faint); }
    .step__label { font-size: 0.75rem; color: var(--ink-soft); font-weight: 500; }
    .step__line  {
      flex: 1; height: 2px; background: var(--border);
      margin: 0 6px; border-radius: 2px; transition: background 0.3s;
    }
    .step__line--done { background: var(--success); }

    /* ── Phone panel ── */
    .input-with-prefix {
      position: relative;
    }
    .input-prefix {
      position: absolute; left: 13px; top: 50%;
      transform: translateY(-50%);
      font-size: 0.9rem; color: var(--ink-soft);
      pointer-events: none; font-weight: 500;
    }
    .input-with-prefix .form-input { padding-left: 44px; }

    /* ── OTP boxes ── */
    .otp-target-text {
      text-align: center;
      font-size: 0.875rem;
      color: var(--ink-soft);
      margin-bottom: 16px;
    }
    .otp-target-text strong { color: var(--ink); }

    .demo-banner {
      display: flex; align-items: center; justify-content: space-between;
      background: #f0fdf4; border: 1px solid #bbf7d0;
      border-radius: 9px; padding: 10px 14px;
      margin-bottom: 18px; gap: 10px;
    }
    .demo-banner__text {
      font-size: 0.78rem; color: var(--success); font-weight: 500;
    }
    .demo-banner__fill {
      background: var(--white); border: 1px solid #86efac;
      color: var(--success); font-size: 0.78rem; font-weight: 700;
      padding: 4px 12px; border-radius: 6px;
      cursor: pointer; white-space: nowrap;
      letter-spacing: 0.1em;
      font-family: monospace;
      transition: background 0.15s;
    }
    .demo-banner__fill:hover { background: #dcfce7; }

    .otp-boxes {
      display: flex; gap: 10px; justify-content: center;
      margin-bottom: 20px;
    }
    .otp-box {
      width: 60px; height: 68px;
      text-align: center; font-size: 1.75rem; font-weight: 700;
      font-family: var(--sans);
      border: 2px solid var(--border);
      border-radius: 12px;
      background: var(--surface); color: var(--ink);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s, transform 0.1s;
      caret-color: transparent;
    }
    .otp-box:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
      background: var(--white);
    }
    .otp-box.filled {
      border-color: var(--ink);
      background: var(--white);
      transform: scale(1.04);
    }
    .otp-box.error-shake { animation: shake 0.4s ease; }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%     { transform: translateX(-5px); }
      40%     { transform: translateX(5px); }
      60%     { transform: translateX(-4px); }
      80%     { transform: translateX(3px); }
    }

    .resend-row {
      text-align: center; font-size: 0.8rem;
      color: var(--ink-faint); margin-top: 12px;
    }
    .resend-btn {
      background: none; border: none;
      color: var(--accent); font-size: 0.8rem; font-weight: 500;
      cursor: pointer; text-decoration: underline;
      font-family: var(--sans); padding: 0;
    }
    .resend-btn:disabled { color: var(--ink-faint); text-decoration: none; cursor: default; }

    .change-num-btn {
      display: block; margin: 12px auto 0;
      background: none; border: none;
      font-size: 0.8rem; color: var(--ink-faint);
      cursor: pointer; font-family: var(--sans);
    }
    .change-num-btn:hover { color: var(--ink-soft); text-decoration: underline; }

    /* ── Verify spinner ── */
    .verify-loader {
      display: none; align-items: center; justify-content: center;
      gap: 10px; font-size: 0.875rem; color: var(--ink-soft);
      padding: 12px 0;
    }
    .verify-loader.visible { display: flex; }
    .spin-ring {
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Error ── */
    .field-error {
      font-size: 0.8rem; color: #b91c1c;
      background: #fef2f2; border: 1px solid #fecaca;
      border-radius: 8px; padding: 9px 13px;
      margin-top: 10px; display: none;
    }
    .field-error.visible { display: block; }

    /* ── Done panel ── */
    .done-wrap { text-align: center; }
    .done-check {
      font-size: 2.5rem; margin-bottom: 12px;
      animation: pop 0.4s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes pop { from { transform:scale(0.3); opacity:0; } to { transform:scale(1); opacity:1; } }
    .done-title {
      font-family: var(--serif);
      font-size: 1.6rem; color: var(--ink);
      margin-bottom: 6px;
    }
    .done-sub {
      font-size: 0.875rem; color: var(--ink-soft);
      margin-bottom: 24px; line-height: 1.6;
    }
    .done-actions { display: flex; flex-direction: column; gap: 10px; }

    /* ── Admin notice ── */
    .admin-notice {
      background: #fffbeb; border: 1px solid #fde68a;
      border-radius: 9px; padding: 10px 14px;
      font-size: 0.8rem; color: var(--warn);
      margin-bottom: 18px; display: none;
    }
    .admin-notice.visible { display: block; }

    /* ── Below card links ── */
    .below-card {
      text-align: center;
      font-size: 0.8rem;
      color: var(--ink-faint);
      margin-top: 16px;
    }
    .below-card a {
      color: var(--accent); text-decoration: none; font-weight: 500;
    }
    .below-card a:hover { text-decoration: underline; }

    /* ── WS dot ── */
    .ws-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--ink-faint);
      display: inline-block; margin-left: 6px;
      vertical-align: middle;
      transition: background 0.3s;
    }
  </style>
</head>
<body>

<nav class="nav">
  <div class="nav__inner">
    <a class="nav__logo" href="../index.html">Zepto<span>Shield</span></a>
    <div class="nav__links">
      <button class="nav__link" onclick="location.href='how.html'">How it works</button>
      <button class="nav__link nav__link--active">Login</button>
      <button class="nav__cta" onclick="location.href='register.html'">Get protected</button>
    </div>
  </div>
</nav>

<div class="login-page">
  <div class="login-box">

    <div class="login-brand">
      <a class="login-brand__logo" href="../index.html">Zepto<span>Shield</span></a>
      <div class="login-brand__sub">
        Parametric disaster insurance for gig workers
        <span class="ws-dot" id="ws-dot" title="Connecting…"></span>
      </div>
    </div>

    <!-- Mode toggle -->
    <div class="mode-toggle" id="mode-toggle">
      <button class="mode-btn mode-btn--active" id="btn-worker" onclick="setMode('worker')">👷 Worker</button>
      <button class="mode-btn" id="btn-admin" onclick="setMode('admin')">⚙️ Admin</button>
    </div>

    <div class="login-card">

      <!-- Step indicators -->
      <div class="steps">
        <div class="step">
          <div class="step__dot step__dot--active" id="dot-1">1</div>
          <span class="step__label">Phone</span>
        </div>
        <div class="step__line" id="line-1"></div>
        <div class="step">
          <div class="step__dot step__dot--pending" id="dot-2">2</div>
          <span class="step__label">Verify</span>
        </div>
        <div class="step__line" id="line-2"></div>
        <div class="step">
          <div class="step__dot step__dot--pending" id="dot-3">✓</div>
          <span class="step__label">Access</span>
        </div>
      </div>

      <!-- Admin notice -->
      <div class="admin-notice" id="admin-notice">
        ⚙️ Admin mode — only pre-authorised phones can access the dashboard.
      </div>

      <!-- Panel 1: Phone -->
      <div id="panel-phone">
        <div class="form-group">
          <label class="form-label" for="inp-phone">Mobile number</label>
          <div class="input-with-prefix">
            <span class="input-prefix">+91</span>
            <input class="form-input" id="inp-phone" type="tel"
              placeholder="9876543210" maxlength="10" inputmode="numeric"
              autocomplete="tel-national" />
          </div>
        </div>
        <div class="field-error" id="phone-err"></div>
        <button class="btn btn--primary btn--full" id="btn-send" style="margin-top:16px;">
          Send OTP →
        </button>
      </div>

      <!-- Panel 2: OTP -->
      <div id="panel-otp" style="display:none;">
        <p class="otp-target-text">
          Code sent to <strong id="otp-phone-label"></strong>
        </p>

        <!-- Demo hint — only shown when server is in demo mode -->
        <div class="demo-banner" id="demo-banner" style="display:none;">
          <span class="demo-banner__text">🧪 Demo mode — tap to fill:</span>
          <button class="demo-banner__fill" onclick="autofillOtp()">1 2 3 4</button>
        </div>

        <div class="otp-boxes">
          <input class="otp-box" id="b0" type="text" maxlength="1" inputmode="numeric" autocomplete="one-time-code" />
          <input class="otp-box" id="b1" type="text" maxlength="1" inputmode="numeric" />
          <input class="otp-box" id="b2" type="text" maxlength="1" inputmode="numeric" />
          <input class="otp-box" id="b3" type="text" maxlength="1" inputmode="numeric" />
        </div>

        <div class="verify-loader" id="verify-loader">
          <div class="spin-ring"></div> Verifying…
        </div>

        <div class="field-error" id="otp-err"></div>

        <button class="btn btn--primary btn--full" id="btn-verify">Verify OTP</button>

        <div class="resend-row" style="margin-top:14px;">
          Didn't get it?
          <button class="resend-btn" id="btn-resend" disabled>
            Resend in <span id="resend-count">30</span>s
          </button>
        </div>
        <button class="change-num-btn" onclick="showPanel('phone')">← Change number</button>
      </div>

      <!-- Panel 3: Done -->
      <div id="panel-done" style="display:none;">
        <div class="done-wrap">
          <div class="done-check" id="done-icon">✅</div>
          <div class="done-title">You're in!</div>
          <p class="done-sub" id="done-sub">Redirecting…</p>
          <div class="done-actions">
            <button class="btn btn--primary btn--full" id="btn-continue">Continue →</button>
            <button class="btn btn--ghost btn--full" id="btn-secondary" style="display:none;">Create account →</button>
          </div>
        </div>
      </div>

    </div><!-- /login-card -->

    <div class="below-card" id="below-card">
      New worker? <a href="register.html">Create your account →</a>
    </div>

  </div>
</div>

<script src="../js/realtime.js"></script>
<script>
const API = "http://localhost:5000";

let currentPhone = "";
let currentMode  = "worker";
let resendTimer  = null;
let isDemoMode   = false; // will be set after first OTP request response

// ── Attach live dot ────────────────────────────────────────────────────────
attachConnectionIndicator("ws-dot");

// ── Session guard: already logged in? ─────────────────────────────────────
(async function checkSession() {
  if (!ZS_AUTH.isLoggedIn()) return;
  const { ok, data } = await apiFetch("GET", "/api/auth/me") || {};
  if (ok) {
    ZS_AUTH.save({ isAdmin: data.isAdmin, worker: data.worker });
    goToDest(data.isAdmin, data.workerExists || !!data.worker, ZS_AUTH.getPhone());
  } else {
    ZS_AUTH.clear();
  }
})();

// ── Mode switching ─────────────────────────────────────────────────────────
function setMode(mode) {
  currentMode = mode;
  document.getElementById("btn-worker").classList.toggle("mode-btn--active", mode === "worker");
  document.getElementById("btn-admin").classList.toggle("mode-btn--active",  mode === "admin");
  document.getElementById("admin-notice").classList.toggle("visible", mode === "admin");
  document.getElementById("below-card").style.display = mode === "worker" ? "block" : "none";
}

// ── Step indicators ────────────────────────────────────────────────────────
function setDot(n, state) {
  const dot = document.getElementById(`dot-${n}`);
  dot.className = `step__dot step__dot--${state}`;
  dot.textContent = state === "done" ? "✓" : String(n);
}
function setLine(n, done) {
  document.getElementById(`line-${n}`).className = `step__line${done ? " step__line--done" : ""}`;
}

function showPanel(name) {
  ["phone","otp","done"].forEach(p =>
    document.getElementById(`panel-${p}`).style.display = p === name ? "block" : "none"
  );
  document.getElementById("mode-toggle").style.display = name === "phone" ? "flex" : "none";

  if (name === "phone")  { setDot(1,"active"); setDot(2,"pending"); setDot(3,"pending"); setLine(1,false); setLine(2,false); }
  if (name === "otp")    { setDot(1,"done"); setDot(2,"active"); setDot(3,"pending"); setLine(1,true); setLine(2,false); setTimeout(() => boxes[0].focus(), 60); }
  if (name === "done")   { setDot(1,"done"); setDot(2,"done"); setDot(3,"done"); setLine(1,true); setLine(2,true); }
}

// ── Error helpers ──────────────────────────────────────────────────────────
function showErr(panel, msg) {
  const el = document.getElementById(`${panel}-err`);
  el.textContent = msg; el.classList.add("visible");
}
function clearErr(panel) {
  document.getElementById(`${panel}-err`).classList.remove("visible");
}

// ── Send OTP ───────────────────────────────────────────────────────────────
document.getElementById("btn-send").addEventListener("click", sendOtp);
document.getElementById("inp-phone").addEventListener("keydown", e => { if (e.key === "Enter") sendOtp(); });

async function sendOtp() {
  const phone = document.getElementById("inp-phone").value.trim();
  clearErr("phone");

  if (!/^\d{10}$/.test(phone)) {
    showErr("phone", "Please enter a valid 10-digit mobile number.");
    return;
  }

  const btn = document.getElementById("btn-send");
  btn.textContent = "Sending…"; btn.disabled = true;

  try {
    const res = await fetch(`${API}/api/auth/send-otp`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ phone }),
    });
    const data = await res.json();

    if (!res.ok) {
      showErr("phone", data.error || "Failed to send OTP");
      return;
    }

    currentPhone = phone;
    isDemoMode   = !!data.demo;

    document.getElementById("otp-phone-label").textContent = `+91 ${phone}`;
    document.getElementById("demo-banner").style.display = data.demo ? "flex" : "none";

    showPanel("otp");
    startResend();

  } catch {
    showErr("phone", "Network error — is the server running?");
  } finally {
    btn.textContent = "Send OTP →"; btn.disabled = false;
  }
}

// ── OTP boxes ──────────────────────────────────────────────────────────────
const boxes = [0,1,2,3].map(i => document.getElementById(`b${i}`));

boxes.forEach((box, i) => {
  box.addEventListener("input", e => {
    const v = e.target.value.replace(/\D/g,"");
    e.target.value = v;
    box.classList.toggle("filled", !!v);
    if (v && i < 3) boxes[i+1].focus();
    if (v && i === 3) tryAutoVerify();
  });

  box.addEventListener("keydown", e => {
    if (e.key === "Backspace" && !box.value && i > 0) {
      boxes[i-1].value = "";
      boxes[i-1].classList.remove("filled");
      boxes[i-1].focus();
    }
  });

  box.addEventListener("paste", e => {
    e.preventDefault();
    const digits = (e.clipboardData || window.clipboardData)
      .getData("text").replace(/\D/g,"").slice(0,4);
    digits.split("").forEach((d,j) => {
      if (boxes[j]) { boxes[j].value = d; boxes[j].classList.add("filled"); }
    });
    if (digits.length >= 4) tryAutoVerify();
    else boxes[Math.min(digits.length, 3)].focus();
  });
});

function getOtp() { return boxes.map(b => b.value).join(""); }
function tryAutoVerify() { if (getOtp().length === 4) setTimeout(() => document.getElementById("btn-verify").click(), 250); }

function autofillOtp() {
  "1234".split("").forEach((d,i) => { boxes[i].value = d; boxes[i].classList.add("filled"); });
  setTimeout(() => document.getElementById("btn-verify").click(), 300);
}

// ── Verify OTP ─────────────────────────────────────────────────────────────
document.getElementById("btn-verify").addEventListener("click", verifyOtp);

async function verifyOtp() {
  const otp = getOtp();
  clearErr("otp");

  if (otp.length !== 4) { showErr("otp", "Please enter the 4-digit code."); return; }

  const btn    = document.getElementById("btn-verify");
  const loader = document.getElementById("verify-loader");
  btn.style.display    = "none";
  loader.classList.add("visible");

  try {
    const res = await fetch(`${API}/api/auth/verify-otp`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ phone: currentPhone, otp }),
    });
    const data = await res.json();

    if (!res.ok) {
      showErr("otp", data.error || "Invalid OTP");
      shakeBoxes();
      boxes.forEach(b => { b.value = ""; b.classList.remove("filled"); });
      boxes[0].focus();
      return;
    }

    // Save session
    ZS_AUTH.save({
      token:   data.token,
      phone:   currentPhone,
      isAdmin: data.isAdmin || currentMode === "admin",
      worker:  data.worker,
    });

    clearTimeout(resendTimer);
    showPanel("done");

    // Set done panel content
    goToDest(data.isAdmin || currentMode === "admin", data.workerExists, currentPhone);

  } catch {
    showErr("otp", "Network error — please try again.");
  } finally {
    loader.classList.remove("visible");
    btn.style.display = "block";
    btn.disabled = false;
  }
}

function goToDest(isAdmin, workerExists, phone) {
  const sub  = document.getElementById("done-sub");
  const btnP = document.getElementById("btn-continue");
  const btnS = document.getElementById("btn-secondary");

  // Check URL ?next= param first
  const next = new URLSearchParams(location.search).get("next");

  if (isAdmin) {
    sub.textContent = "Redirecting to admin dashboard…";
    btnP.textContent = "Open admin dashboard →";
    btnP.onclick = () => location.href = "admin.html";
    btnS.style.display = "none";
    setTimeout(() => location.href = next || "admin.html", 1500);
  } else if (workerExists) {
    sub.textContent = "Redirecting to your dashboard…";
    btnP.textContent = "Go to dashboard →";
    btnP.onclick = () => location.href = next || `dashboard.html?phone=${phone}`;
    btnS.style.display = "none";
    setTimeout(() => location.href = next || `dashboard.html?phone=${phone}`, 1500);
  } else {
    sub.textContent = "Phone verified! Let's complete your profile.";
    btnP.style.display = "none";
    btnS.style.display = "block";
    btnS.textContent   = "Create your account →";
    btnS.onclick = () => location.href = `register.html?phone=${phone}`;
    setTimeout(() => location.href = `register.html?phone=${phone}`, 1500);
  }
}

// ── Resend timer ───────────────────────────────────────────────────────────
function startResend() {
  let t = 30;
  const btn = document.getElementById("btn-resend");
  const cnt = document.getElementById("resend-count");
  btn.disabled = true;
  cnt.textContent = t;

  clearInterval(resendTimer);
  resendTimer = setInterval(() => {
    t--;
    cnt.textContent = t;
    if (t <= 0) {
      clearInterval(resendTimer);
      btn.disabled  = false;
      btn.innerHTML = "Resend OTP";
    }
  }, 1000);
}

document.getElementById("btn-resend").addEventListener("click", async () => {
  if (!currentPhone) return;
  try {
    await fetch(`${API}/api/auth/send-otp`, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ phone: currentPhone }),
    });
  } catch {}
  startResend();
  boxes.forEach(b => { b.value = ""; b.classList.remove("filled"); });
  boxes[0].focus();
});

// ── Shake animation ─────────────────────────────────────────────────────────
function shakeBoxes() {
  boxes.forEach(b => {
    b.classList.remove("error-shake");
    void b.offsetWidth;
    b.classList.add("error-shake");
  });
}

// ── Pre-fill from URL ──────────────────────────────────────────────────────
const urlP = new URLSearchParams(location.search);
if (urlP.get("phone")) document.getElementById("inp-phone").value = urlP.get("phone");
if (urlP.get("mode") === "admin") setMode("admin");
</script>
</body>
</html>
